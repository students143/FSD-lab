<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Page</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .main-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
            padding: 40px;
        }

        .btn-purple {
            background-color: #6f42c1;
            color: white;
            border-radius: 20px;
        }

        .btn-purple:hover {
            background-color: #5a32a3;
        }

        .btn-outline-dark {
            border-radius: 20px;
        }

        .navbar-brand span {
            background-color: #6f42c1;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light px-4">
    <a class="navbar-brand"><span>B</span></a>

    <div>
        <a class="mx-2 text-dark">Home</a>
        <a class="mx-2 text-dark">Portfolio</a>
        <a class="mx-2 text-dark">Services</a>
        <a class="mx-2 text-dark">Blog</a>
    </div>
</nav>

<!-- Main Section -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10 main-card">

            <div class="row align-items-center">

                <!-- Text -->
                <div class="col-md-6">
                    <h3 class="fw-bold">Create your own website</h3>
                    <p class="text-muted">
                        Build a high performing bootstrap template
                    </p>

                    <button class="btn btn-purple px-4 me-2">Get Started</button>
                    <button class="btn btn-outline-dark px-4">Learn More</button>
                </div>

                <!-- Image -->
                <div class="col-md-6 text-center">
                    <img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png" 
                         class="img-fluid" width="250">
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
